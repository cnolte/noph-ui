<!doctype html>
<html lang="en" %theme%>
	<head>
		<meta charset="utf-8" />
		<link href="%sveltekit.assets%/favicon.svg" rel="icon" sizes="any" type="image/svg+xml" />
		<link href="%sveltekit.assets%/favicon.png" rel="icon" sizes="144x144" />
		<link rel="apple-touch-icon" href="/logo192.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<style>
			@font-face {
				font-family: 'Material Symbols Outlined';
				font-style: normal;
				font-weight: 100 700;
				src: url(%sveltekit.assets%/material-symbols-outlined.woff2) format('woff2');
			}

			.material-symbols-outlined {
				font-family: 'Material Symbols Outlined';
				font-weight: normal;
				font-style: normal;
				font-size: 24px;
				line-height: 1;
				letter-spacing: normal;
				text-transform: none;
				display: inline-block;
				white-space: nowrap;
				word-wrap: normal;
				direction: ltr;
				font-feature-settings: 'liga';
				-webkit-font-feature-settings: 'liga';
				-webkit-font-smoothing: antialiased;
			}
			.material-symbols-outlined {
				font-variation-settings:
					'FILL' 0,
					'wght' 400,
					'GRAD' 0,
					'opsz' 24;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div>%sveltekit.body%</div>
	</body>
</html>
